version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flycash-app
    ports:
      - "8080:80"
    volumes:
      - ./.env:/var/www/html/.env
      - ./docker/php.ini:/usr/local/etc/php/conf.d/99-flycash.ini
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-flycash}
      DB_USER: ${DB_USER:-flycash}
      DB_PASS: ${DB_PASS:?set DB_PASS in .env}
      APP_ENV: development
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      APP_TIMEZONE: UTC
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flycash

  db:
    image: mysql:8.0
    container_name: flycash-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-flycash}
      MYSQL_USER: ${DB_USER:-flycash}
      MYSQL_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flycash

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: flycash-pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-flycash}
      PMA_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flycash

volumes:
  db_data:

networks:
  flycash:
