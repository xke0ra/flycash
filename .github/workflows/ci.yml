name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.1, 8.2]
      fail-fast: false

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: flycash_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h 127.0.0.1" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mbstring, json
          tools: composer
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Configure environment
        run: |
          cp .env.example .env
          sed -i "s/DB_HOST=localhost/DB_HOST=127.0.0.1/" .env
          sed -i "s/DB_NAME=pocket_db/DB_NAME=flycash_test/" .env
          sed -i "s/DB_PASS=/DB_PASS=/" .env
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "LOG_LEVEL=error" >> .env

      - name: Run database migrations
        run: |
          mysql -h 127.0.0.1 -u root -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY ''; FLUSH PRIVILEGES;" 2>/dev/null || true
          mysql -h 127.0.0.1 -u root -e "CREATE DATABASE IF NOT EXISTS flycash_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          php vendor/bin/phinx migrate -e development

      - name: Run PHPUnit tests
        run: php vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Run PHPStan
        run: php vendor/bin/phpstan analyse --level=6 src/ admin/core/ --no-progress

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: coverage-${{ matrix.php }}
          path: coverage.xml
