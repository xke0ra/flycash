name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: pocket_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Initialize database via Phinx migrations
        run: |
          mysql -h 127.0.0.1 -u root -e "CREATE DATABASE IF NOT EXISTS pocket_db DEFAULT CHARACTER SET utf8 COLLATE utf8_general_ci;"
          vendor/bin/phinx migrate
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: pocket_db
          DB_USER: root
          DB_PASS: ""

      - name: Seed default data
        run: mysql -h 127.0.0.1 -u root pocket_db < docs/default_data.sql

      - name: Run PHPStan static analysis
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: pocket_db
          DB_USER: root
          DB_PASS: ""

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-dev

      - name: Check for security vulnerabilities
        run: composer audit
